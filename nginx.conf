server {
    listen __NGINX_PORT__;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
    }
}
